apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eshop-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tmwaas/eshop-app-modernization.git'
    targetRevision: HEAD
    path: k8s-manifests
  destination: { server: 'https://kubernetes.default.svc', namespace: default }
  syncPolicy: { automated: { prune: true, selfHeal: true } }