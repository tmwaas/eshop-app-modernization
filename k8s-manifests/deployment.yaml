apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshop-linux-app
  labels: { app: eshop-app }
spec:
  replicas: 2
  selector: { matchLabels: { app: eshop-app } }
  template:
    metadata:
      labels: { app: eshop-app }
    spec:
      containers:
      - name: app
        image: 518890435133.dkr.ecr.us-east-1.amazonaws.com/eshop-linux-app:latest
        ports: [{ containerPort: 8080 }]
        resources:
          limits: { cpu: "500m", memory: "512Mi" }
          requests: { cpu: "250m", memory: "256Mi" }